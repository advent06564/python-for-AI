name: CI
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Syntax check Python files
        run: |
          find . -name '*.py' -exec python -m py_compile {} + 2>/dev/null || echo "No Python files found"
          echo "Python syntax check completed"
